name: Update Satellite Analyses (Group A)
# environmental_risk + climate_comfort + green_capital

on:
  schedule:
    - cron: '0 7 1,16 * *'  # 1st and 16th of each month, 07:00 UTC
  workflow_dispatch:
    inputs:
      analyses:
        description: 'Comma-separated analysis IDs (default: all group A)'
        default: 'environmental_risk,climate_comfort,green_capital'

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          pip install -r pipeline/requirements.txt
          npm install -g wrangler

      - name: Generate H3 grid (if needed)
        run: |
          if [ ! -f pipeline/output/hexagons-lite.geojson ]; then
            python pipeline/generate_h3_grid.py
            python pipeline/simplify_geojson.py
          fi

      - name: Run pixel update pipeline
        run: |
          python pipeline/run_pixel_update.py \
            --analyses ${{ github.event.inputs.analyses || 'environmental_risk,climate_comfort,green_capital' }}
        env:
          GEE_SERVICE_ACCOUNT_KEY: ${{ secrets.GEE_SERVICE_ACCOUNT_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: satellite-pixel-a
          path: |
            pipeline/output/sat_environmental_risk.parquet
            pipeline/output/sat_climate_comfort.parquet
            pipeline/output/sat_green_capital.parquet
          retention-days: 30

      - name: Notify on failure
        if: failure()
        run: echo "::error::Satellite Group A pipeline failed."
