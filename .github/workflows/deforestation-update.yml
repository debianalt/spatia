name: Update Deforestation Dynamics (Hansen)

on:
  schedule:
    - cron: '0 8 1 4,10 *'  # April 1 and October 1 (Hansen updates ~April annually)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
      secrets: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          pip install -r pipeline/requirements.txt
          npm install -g wrangler

      - name: Refresh Cloudflare auth
        run: |
          RESP=$(curl -sf -X POST "https://dash.cloudflare.com/oauth2/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=refresh_token" \
            --data-urlencode "refresh_token=${{ secrets.WRANGLER_REFRESH_TOKEN }}" \
            --data-urlencode "client_id=54d11594-84e4-41aa-b438-e81b8fa78ee7")
          ACCESS=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          NEW_REFRESH=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['refresh_token'])")
          echo "::add-mask::$ACCESS"
          echo "::add-mask::$NEW_REFRESH"
          EXPIRES=$(date -u -d '+59 minutes' '+%Y-%m-%dT%H:%M:%S.000Z')
          mkdir -p ~/.wrangler/config
          printf 'oauth_token = "%s"\nexpiration_time = "%s"\n' "$ACCESS" "$EXPIRES" > ~/.wrangler/config/default.toml
          echo "$NEW_REFRESH" | gh secret set WRANGLER_REFRESH_TOKEN --repo debianalt/nealab
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Generate H3 grid (if needed)
        run: |
          if [ ! -f pipeline/output/hexagons-lite.geojson ]; then
            python pipeline/generate_h3_grid.py
            python pipeline/simplify_geojson.py
          fi

      - name: Export Hansen loss year from GEE
        run: python pipeline/gee_export_hansen_loss.py
        env:
          GEE_SERVICE_ACCOUNT_KEY: ${{ secrets.GEE_SERVICE_ACCOUNT_KEY }}

      - name: Download Hansen TIFFs from Drive
        run: python pipeline/download_from_drive.py --pattern "hansen_*.tif"
        env:
          GEE_SERVICE_ACCOUNT_KEY: ${{ secrets.GEE_SERVICE_ACCOUNT_KEY }}

      - name: Process Hansen to H3 hexagonal grid
        run: python pipeline/process_hansen_to_h3.py

      - name: Download areal crosswalk from R2
        run: |
          npx wrangler r2 object get "neahub/data/h3_radio_crosswalk_areal.parquet" \
            --file "pipeline/output/h3_radio_crosswalk_areal.parquet" --remote
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Split by department
        run: python pipeline/split_satellite_by_dpto.py --only deforestation_dynamics

      - name: Upload to R2
        run: |
          npx wrangler r2 object put "neahub/data/sat_deforestation_dynamics.parquet" \
            --file "pipeline/output/sat_deforestation_dynamics.parquet" --remote
          for f in pipeline/output/sat_dpto/sat_deforestation_dynamics_*.parquet; do
            npx wrangler r2 object put "neahub/data/sat_dpto/$(basename $f)" \
              --file "$f" --remote
          done
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload dept summary JSON
        run: |
          npx wrangler r2 object put "neahub/data/sat_deforestation_dynamics_dept_summary.json" \
            --file "src/lib/data/sat_deforestation_dynamics_dept_summary.json" --remote 2>/dev/null || true
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deforestation-dynamics
          path: |
            pipeline/output/sat_deforestation_dynamics.parquet
            pipeline/output/hansen_h3_annual.parquet
          retention-days: 30

      - name: Notify on failure
        if: failure()
        run: echo "::error::Deforestation dynamics pipeline failed."
