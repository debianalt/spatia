name: Update Temporal Baselines (Itapúa)
# Monthly delta scores (current vs baseline) for the 6 pixel analyses in Itapúa.
# Requires baselines to be pre-cached in R2 (run --include-baseline locally first).

on:
  schedule:
    - cron: '0 7 20 * *'  # 20th of each month, 07:00 UTC
  workflow_dispatch:
    inputs:
      analyses:
        description: 'Comma-separated analysis IDs (default: all 6)'
        default: 'environmental_risk,climate_comfort'
      include_baseline:
        description: 'Also export baseline from GEE (first run or re-calibration)'
        type: boolean
        default: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          pip install -r pipeline/requirements.txt
          npm install -g wrangler

      - name: Generate H3 grid for Itapúa if needed
        run: |
          if [ ! -f pipeline/output/itapua_py/hexagons.geojson ] && [ ! -f pipeline/output/itapua_py/hexagons-lite.geojson ]; then
            if [ ! -f pipeline/data/gadm41_PRY_2.shp ]; then
              mkdir -p pipeline/data
              curl -sL https://geodata.ucdavis.edu/gadm/gadm4.1/shp/gadm41_PRY_shp.zip -o pipeline/data/gadm41_PRY_shp.zip
              (cd pipeline/data && unzip -o gadm41_PRY_shp.zip "gadm41_PRY_2*" >/dev/null)
            fi
            python pipeline/build_admin_crosswalk.py --territory itapua_py --source gadm \
              --shapefile pipeline/data/gadm41_PRY_2.shp || echo "::warning::hexagon grid not generated; temporal step may fail"
          fi

      - name: Run temporal update pipeline (Itapúa)
        run: |
          python pipeline/run_temporal_update.py \
            --analyses ${{ github.event.inputs.analyses || 'environmental_risk,climate_comfort' }} \
            --territory itapua_py \
            ${{ github.event.inputs.include_baseline == 'true' && '--include-baseline' || '' }}
        env:
          GEE_SERVICE_ACCOUNT_KEY: ${{ secrets.GEE_SERVICE_ACCOUNT_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: satellite-temporal-itapua
          path: |
            pipeline/output/itapua_py/sat_environmental_risk.parquet
            pipeline/output/itapua_py/sat_climate_comfort.parquet
            pipeline/output/itapua_py/sat_green_capital.parquet
            pipeline/output/itapua_py/sat_change_pressure.parquet
            pipeline/output/itapua_py/sat_agri_potential.parquet
            pipeline/output/itapua_py/sat_forest_health.parquet
          retention-days: 30

      - name: Notify on failure
        if: failure()
        run: echo "::error::Itapúa temporal pipeline failed."
