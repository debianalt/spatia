name: Update Dynamic World Land Use

on:
  schedule:
    - cron: '0 7 8,23 * *'  # 8th and 23rd of each month, 07:00 UTC
  workflow_dispatch:
    inputs:
      year:
        description: 'Year for Dynamic World composite'
        default: '2024'

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      secrets: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          pip install -r pipeline/requirements.txt
          npm install -g wrangler

      - name: Refresh Cloudflare auth
        run: |
          RESP=$(curl -sf -X POST "https://dash.cloudflare.com/oauth2/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=refresh_token" \
            --data-urlencode "refresh_token=${{ secrets.WRANGLER_REFRESH_TOKEN }}" \
            --data-urlencode "client_id=54d11594-84e4-41aa-b438-e81b8fa78ee7")
          ACCESS=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          NEW_REFRESH=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['refresh_token'])")
          echo "::add-mask::$ACCESS"
          echo "::add-mask::$NEW_REFRESH"
          EXPIRES=$(date -u -d '+59 minutes' '+%Y-%m-%dT%H:%M:%S.000Z')
          mkdir -p ~/.wrangler/config
          printf 'oauth_token = "%s"\nexpiration_time = "%s"\n' "$ACCESS" "$EXPIRES" > ~/.wrangler/config/default.toml
          echo "$NEW_REFRESH" | gh secret set WRANGLER_REFRESH_TOKEN --repo debianalt/nealab
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Generate H3 grid (if needed)
        run: |
          if [ ! -f pipeline/output/hexagons-lite.geojson ]; then
            python pipeline/generate_h3_grid.py
            python pipeline/simplify_geojson.py
          fi

      - name: Export Dynamic World from GEE
        run: python pipeline/gee_dynamic_world.py --year ${{ github.event.inputs.year || '2024' }}
        env:
          GEE_SERVICE_ACCOUNT_KEY: ${{ secrets.GEE_SERVICE_ACCOUNT_KEY }}

      - name: Download from GCS
        run: |
          python -c "
          import json, os
          from google.cloud import storage
          from google.oauth2 import service_account

          key = json.loads(os.environ['GEE_SERVICE_ACCOUNT_KEY'])
          creds = service_account.Credentials.from_service_account_info(key)
          client = storage.Client(credentials=creds, project=key.get('project_id'))
          bucket = client.bucket('spatia-satellite')

          year = '${{ github.event.inputs.year || '2024' }}'
          for prefix in [f'dw_probs_{year}', f'dw_label_{year}']:
              for blob in bucket.list_blobs(prefix=prefix):
                  local = f'pipeline/output/{blob.name}'
                  os.makedirs(os.path.dirname(local), exist_ok=True)
                  blob.download_to_filename(local)
                  print(f'Downloaded: {local} ({blob.size/1024/1024:.1f} MB)')
          "
        env:
          GEE_SERVICE_ACCOUNT_KEY: ${{ secrets.GEE_SERVICE_ACCOUNT_KEY }}

      - name: Process to H3
        run: python pipeline/process_dw_to_h3.py

      - name: Download static reference data
        run: |
          python -c "
          import json, os
          from google.cloud import storage
          from google.oauth2 import service_account

          key = json.loads(os.environ['GEE_SERVICE_ACCOUNT_KEY'])
          creds = service_account.Credentials.from_service_account_info(key)
          client = storage.Client(credentials=creds, project=key.get('project_id'))
          bucket = client.bucket('spatia-satellite')

          for fname in ['radios_misiones.parquet', 'radio_stats_master.parquet']:
              local = f'pipeline/output/{fname}'
              print(f'Downloading gs://spatia-satellite/static/{fname}...')
              bucket.blob(f'static/{fname}').download_to_filename(local)
              size_mb = os.path.getsize(local) / (1024 * 1024)
              print(f'  OK: {size_mb:.1f} MB')
          "
        env:
          GEE_SERVICE_ACCOUNT_KEY: ${{ secrets.GEE_SERVICE_ACCOUNT_KEY }}

      - name: Download areal crosswalk from R2
        run: |
          npx wrangler r2 object get "neahub/data/h3_radio_crosswalk_areal.parquet" \
            --file "pipeline/output/h3_radio_crosswalk_areal.parquet" --remote
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Split by department
        run: python pipeline/split_satellite_by_dpto.py --only land_use

      - name: Generate PDF reports
        run: python pipeline/generate_dept_report.py --only land_use

      - name: Upload to R2
        run: |
          npx wrangler r2 object put neahub/data/sat_land_use.parquet --file pipeline/output/sat_land_use.parquet --remote
          for f in pipeline/output/sat_dpto/sat_land_use_*.parquet; do
            name=$(basename "$f")
            npx wrangler r2 object put "neahub/data/sat_dpto/$name" --file "$f" --remote
          done
          for f in pipeline/output/reports/sat_land_use_*.pdf; do
            name=$(basename "$f")
            npx wrangler r2 object put "neahub/data/reports/$name" --file "$f" --remote
          done
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: land-use-parquet
          path: pipeline/output/sat_land_use.parquet
          retention-days: 30

      - name: Notify on failure
        if: failure()
        run: echo "::error::Dynamic World pipeline failed."
