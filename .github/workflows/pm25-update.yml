name: Update PM2.5 Drivers (ACAG V6)

on:
  schedule:
    - cron: '0 8 15 5,11 *'  # May 15 and November 15 (ACAG updates ~annually)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          pip install -r pipeline/requirements.txt
          pip install shap optuna lightgbm
          npm install -g wrangler

      - name: Generate H3 grid (if needed)
        run: |
          if [ ! -f pipeline/output/hexagons-lite.geojson ]; then
            python pipeline/generate_h3_grid.py
            python pipeline/simplify_geojson.py
          fi

      - name: Download crosswalks and radio data from R2 and GCS
        run: |
          mkdir -p pipeline/output/radio_data
          for f in h3_parent_crosswalk h3_radio_crosswalk_areal; do
            npx wrangler r2 object get "neahub/data/${f}.parquet" \
              --file "pipeline/output/${f}.parquet" --remote
          done
          for table in radios_misiones fire_annual era5_annual chirps_annual ndvi_annual_mean lst_annual npp_annual vcf_annual fabdem_terrain soilgrids merit_hydro hansen_baseline; do
            npx wrangler r2 object get "neahub/data/radio_data/${table}.parquet" \
              --file "pipeline/output/radio_data/${table}.parquet" --remote 2>/dev/null || true
          done
          python -c "
import json, os
from google.cloud import storage
from google.oauth2 import service_account
key = json.loads(os.environ['GEE_SERVICE_ACCOUNT_KEY'])
creds = service_account.Credentials.from_service_account_info(key)
client = storage.Client(credentials=creds, project=key['project_id'])
bucket = client.bucket('spatia-satellite')
bucket.blob('static/radio_stats_master.parquet').download_to_filename('pipeline/output/radio_stats_master.parquet')
print('Downloaded radio_stats_master.parquet from GCS')
"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GEE_SERVICE_ACCOUNT_KEY: ${{ secrets.GEE_SERVICE_ACCOUNT_KEY }}

      - name: Export PM2.5 annual rasters from GEE
        run: python pipeline/gee_export_pm25_annual.py
        env:
          GEE_SERVICE_ACCOUNT_KEY: ${{ secrets.GEE_SERVICE_ACCOUNT_KEY }}

      - name: Download PM2.5 TIFFs from Drive
        run: python pipeline/download_from_drive.py --pattern "sat_pm25_*.tif"
        env:
          GEE_SERVICE_ACCOUNT_KEY: ${{ secrets.GEE_SERVICE_ACCOUNT_KEY }}

      - name: Process PM2.5 to H3 panel
        run: python pipeline/process_pm25_annual_to_h3.py

      - name: Build model panel and compute drivers layer
        run: |
          python pipeline/model_pm25_spatial.py --phase build
          python pipeline/compute_pm25_drivers.py

      - name: Split by department
        run: python pipeline/split_satellite_by_dpto.py --only pm25_drivers

      - name: Upload to R2
        run: |
          npx wrangler r2 object put "neahub/data/sat_pm25_drivers.parquet" \
            --file "pipeline/output/sat_pm25_drivers.parquet" --remote
          for f in pipeline/output/sat_dpto/sat_pm25_drivers_*.parquet; do
            npx wrangler r2 object put "neahub/data/sat_dpto/$(basename $f)" \
              --file "$f" --remote
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pm25-drivers
          path: |
            pipeline/output/sat_pm25_drivers.parquet
            pipeline/output/pm25_model_results.json
          retention-days: 30

      - name: Notify on failure
        if: failure()
        run: echo "::error::PM2.5 drivers pipeline failed."
