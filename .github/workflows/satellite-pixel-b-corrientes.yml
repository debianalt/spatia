name: Update Satellite Analyses (Corrientes — Group B)
# change_pressure + agri_potential + forest_health for Corrientes (AR)

on:
  schedule:
    - cron: '0 7 10,25 * *'  # 10th and 25th of each month, 07:00 UTC
  workflow_dispatch:
    inputs:
      analyses:
        description: 'Comma-separated analysis IDs (default: all group B)'
        default: 'change_pressure,agri_potential,forest_health'

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          pip install -r pipeline/requirements.txt
          npm install -g wrangler

      - name: Run Corrientes pixel pipeline
        run: |
          python pipeline/run_corrientes_pipeline.py \
            --only ${{ github.event.inputs.analyses || 'change_pressure,agri_potential,forest_health' }} \
            --upload
        env:
          GEE_SERVICE_ACCOUNT_KEY: ${{ secrets.GEE_SERVICE_ACCOUNT_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: satellite-pixel-b-corrientes
          path: |
            pipeline/output/corrientes/sat_change_pressure.parquet
            pipeline/output/corrientes/sat_agri_potential.parquet
            pipeline/output/corrientes/sat_forest_health.parquet
          retention-days: 30

      - name: Notify on failure
        if: failure()
        run: echo "::error::Corrientes Group B pipeline failed."
