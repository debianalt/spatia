name: Update Catastro Layer
# Runs monthly: 1st of every month at 08:00 UTC (~05:00 ART)
on:
  schedule:
    - cron: '0 8 1 * *'  # First day of each month, 08:00 UTC
  workflow_dispatch:       # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          pip install -r pipeline/requirements.txt
          npm install -g wrangler

      - name: Download static reference data from GCS
        run: |
          python -c "
          import json, os
          from google.cloud import storage
          from google.oauth2 import service_account

          key = json.loads(os.environ['GEE_SERVICE_ACCOUNT_KEY'])
          creds = service_account.Credentials.from_service_account_info(key)
          client = storage.Client(credentials=creds, project=key.get('project_id'))
          bucket = client.bucket('spatia-satellite')

          for fname in ['radios_misiones.parquet', 'radio_stats_master.parquet']:
              local = f'pipeline/output/{fname}'
              print(f'Downloading gs://spatia-satellite/static/{fname}...')
              bucket.blob(f'static/{fname}').download_to_filename(local)
              size_mb = os.path.getsize(local) / (1024 * 1024)
              print(f'  OK: {size_mb:.1f} MB')
          "
        env:
          GEE_SERVICE_ACCOUNT_KEY: ${{ secrets.GEE_SERVICE_ACCOUNT_KEY }}

      - name: Run catastro update pipeline
        working-directory: pipeline
        run: python run_catastro_update.py
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload outputs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: catastro-outputs
          path: |
            pipeline/output/catastro_by_radio.parquet
            pipeline/output/catastro_changes_summary.parquet
            pipeline/output/catastro.pmtiles
          retention-days: 30

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Catastro pipeline failed. Check logs."
