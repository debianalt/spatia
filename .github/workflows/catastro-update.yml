name: Update Catastro Layer

on:
  schedule:
    - cron: '0 8 1,15 * *'  # 1st and 15th of each month, 08:00 UTC
  workflow_dispatch:          # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          pip install -r pipeline/requirements.txt
          npm install -g wrangler

      - name: Run catastro update pipeline
        working-directory: pipeline
        run: python run_catastro_update.py
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload parquets as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: catastro-parquets
          path: |
            pipeline/output/catastro_by_radio.parquet
            pipeline/output/catastro_changes_summary.parquet
          retention-days: 30

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Catastro pipeline failed. Check logs."
