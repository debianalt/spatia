name: Update Overture Indices

on:
  schedule:
    - cron: '0 10 1 1,4,7,10 *'  # 1st of Jan, Apr, Jul, Oct — quarterly
  workflow_dispatch:
    inputs:
      release:
        description: 'Overture release version (e.g., 2026-03-18.0)'
        required: false
      theme:
        description: 'Single theme to update (leave empty for all)'
        required: false
        type: choice
        options:
          - ''
          - buildings
          - transportation
          - places
          - base

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      secrets: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          pip install -r pipeline/requirements.txt
          npm install -g wrangler

      - name: Refresh Cloudflare auth
        run: |
          RESP=$(curl -sf -X POST "https://dash.cloudflare.com/oauth2/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=refresh_token" \
            --data-urlencode "refresh_token=${{ secrets.WRANGLER_REFRESH_TOKEN }}" \
            --data-urlencode "client_id=54d11594-84e4-41aa-b438-e81b8fa78ee7")
          ACCESS=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          NEW_REFRESH=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['refresh_token'])")
          echo "::add-mask::$ACCESS"
          echo "::add-mask::$NEW_REFRESH"
          EXPIRES=$(date -u -d '+59 minutes' '+%Y-%m-%dT%H:%M:%S.000Z')
          mkdir -p ~/.wrangler/config
          printf 'oauth_token = "%s"\nexpiration_time = "%s"\n' "$ACCESS" "$EXPIRES" > ~/.wrangler/config/default.toml
          echo "$NEW_REFRESH" | gh secret set WRANGLER_REFRESH_TOKEN --repo debianalt/nealab
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run Overture update pipeline
        working-directory: pipeline
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.release }}" ]; then
            ARGS="$ARGS --release ${{ github.event.inputs.release }}"
          fi
          if [ -n "${{ github.event.inputs.theme }}" ]; then
            ARGS="$ARGS --theme ${{ github.event.inputs.theme }}"
          fi
          python run_overture_update.py $ARGS
        env:
          GEE_SERVICE_ACCOUNT_KEY: ${{ secrets.GEE_SERVICE_ACCOUNT_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload parquets as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: overture-parquets
          path: pipeline/output/overture_*.parquet
          retention-days: 30

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Overture pipeline failed. Check logs."
