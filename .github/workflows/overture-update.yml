name: Update Overture Indices

on:
  schedule:
    - cron: '0 10 1 1,4,7,10 *'  # 1st of Jan, Apr, Jul, Oct — quarterly
  workflow_dispatch:
    inputs:
      release:
        description: 'Overture release version (e.g., 2026-03-18.0)'
        required: false
      theme:
        description: 'Single theme to update (leave empty for all)'
        required: false
        type: choice
        options:
          - ''
          - buildings
          - transportation
          - places
          - base

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          pip install -r pipeline/requirements.txt
          npm install -g wrangler

      - name: Download static reference data from GCS
        run: |
          python -c "
          import json, os
          from google.cloud import storage
          from google.oauth2 import service_account

          key = json.loads(os.environ['GEE_SERVICE_ACCOUNT_KEY'])
          creds = service_account.Credentials.from_service_account_info(key)
          client = storage.Client(credentials=creds, project=key.get('project_id'))
          bucket = client.bucket('spatia-satellite')

          for fname in ['radios_misiones.parquet', 'radio_stats_master.parquet']:
              local = f'pipeline/output/{fname}'
              print(f'Downloading gs://spatia-satellite/static/{fname}...')
              bucket.blob(f'static/{fname}').download_to_filename(local)
              size_mb = os.path.getsize(local) / (1024 * 1024)
              print(f'  OK: {size_mb:.1f} MB')
          "
        env:
          GEE_SERVICE_ACCOUNT_KEY: ${{ secrets.GEE_SERVICE_ACCOUNT_KEY }}

      - name: Run Overture update pipeline
        working-directory: pipeline
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.release }}" ]; then
            ARGS="$ARGS --release ${{ github.event.inputs.release }}"
          fi
          if [ -n "${{ github.event.inputs.theme }}" ]; then
            ARGS="$ARGS --theme ${{ github.event.inputs.theme }}"
          fi
          python run_overture_update.py $ARGS
        env:
          GEE_SERVICE_ACCOUNT_KEY: ${{ secrets.GEE_SERVICE_ACCOUNT_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Upload parquets as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: overture-parquets
          path: pipeline/output/overture_*.parquet
          retention-days: 30

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Overture pipeline failed. Check logs."
