name: Update Satellite Analyses (Group B)
# change_pressure + agri_potential + forest_health

on:
  schedule:
    - cron: '0 7 3,18 * *'  # 3rd and 18th of each month, 07:00 UTC
  workflow_dispatch:
    inputs:
      analyses:
        description: 'Comma-separated analysis IDs (default: all group B)'
        default: 'change_pressure,agri_potential,forest_health'

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          pip install -r pipeline/requirements.txt
          npm install -g wrangler

      - name: Generate H3 grid (if needed)
        run: |
          if [ ! -f pipeline/output/hexagons-lite.geojson ]; then
            python pipeline/generate_h3_grid.py
          fi

      - name: Run pixel update pipeline
        run: |
          python pipeline/run_pixel_update.py \
            --analyses ${{ github.event.inputs.analyses || 'change_pressure,agri_potential,forest_health' }}
        env:
          GEE_SERVICE_ACCOUNT_KEY: ${{ secrets.GEE_SERVICE_ACCOUNT_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: satellite-pixel-b
          path: |
            pipeline/output/sat_change_pressure.parquet
            pipeline/output/sat_agri_potential.parquet
            pipeline/output/sat_forest_health.parquet
          retention-days: 30

      - name: Notify on failure
        if: failure()
        run: echo "::error::Satellite Group B pipeline failed."
