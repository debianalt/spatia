name: Update Satellite Analyses (Group B)
# change_pressure + agri_potential + forest_health

on:
  schedule:
    - cron: '0 7 3,18 * *'  # 3rd and 18th of each month, 07:00 UTC
  workflow_dispatch:
    inputs:
      analyses:
        description: 'Comma-separated analysis IDs (default: all group B)'
        default: 'change_pressure,agri_potential,forest_health'

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          pip install -r pipeline/requirements.txt
          npm install -g wrangler

      - name: Download radio data tables from R2
        run: |
          mkdir -p pipeline/output/radio_data
          npx wrangler r2 object get "neahub/data/h3_radio_crosswalk.parquet" --file "pipeline/output/h3_radio_crosswalk.parquet" --remote
          npx wrangler r2 object get "neahub/data/h3_radio_crosswalk_areal.parquet" --file "pipeline/output/h3_radio_crosswalk_areal.parquet" --remote
          for table in radios_misiones hansen_baseline fabdem_terrain merit_hydro soilgrids nelson_accessibility oxford_accessibility road_access censo2022_variables fire_annual lst_annual chirps_annual era5_annual et_annual ndvi_annual_mean npp_annual lai_annual vcf_annual viirs_annual ghsl_built_surface gpp_annual; do
            npx wrangler r2 object get "neahub/data/radio_data/${table}.parquet" --file "pipeline/output/radio_data/${table}.parquet" --remote 2>/dev/null || true
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Run pixel update pipeline (direct reduceRegions)
        run: |
          python pipeline/run_pixel_update.py \
            --analyses ${{ github.event.inputs.analyses || 'change_pressure,agri_potential,forest_health' }}
        env:
          GEE_SERVICE_ACCOUNT_KEY: ${{ secrets.GEE_SERVICE_ACCOUNT_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Compute typologies and split by department
        working-directory: pipeline
        run: |
          ANALYSES="${{ github.event.inputs.analyses || 'change_pressure,agri_potential,forest_health' }}"
          python compute_analysis_typologies.py --only "$ANALYSES"
          python split_satellite_by_dpto.py --only "$ANALYSES"

      - name: Upload recomputed scores to R2
        run: |
          for aid in $(echo "${{ github.event.inputs.analyses || 'change_pressure,agri_potential,forest_health' }}" | tr ',' ' '); do
            npx wrangler r2 object put "neahub/data/sat_${aid}.parquet" --file "pipeline/output/sat_${aid}.parquet" --remote 2>/dev/null || true
            for f in pipeline/output/sat_dpto/sat_${aid}_*.parquet; do
              [ -f "$f" ] && npx wrangler r2 object put "neahub/data/sat_dpto/$(basename $f)" --file "$f" --remote 2>/dev/null || true
            done
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: satellite-pixel-b
          path: |
            pipeline/output/sat_change_pressure.parquet
            pipeline/output/sat_agri_potential.parquet
            pipeline/output/sat_forest_health.parquet
          retention-days: 30

      - name: Notify on failure
        if: failure()
        run: echo "::error::Satellite Group B pipeline failed."
