name: Update Flood Risk Layer

on:
  schedule:
    - cron: '0 6 1 * *'  # 1st of each month, 06:00 UTC
  workflow_dispatch:       # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          pip install -r pipeline/requirements.txt
          npm install -g wrangler

      - name: Generate H3 grid (if needed)
        run: |
          if [ ! -f pipeline/output/hexagons.geojson ]; then
            python pipeline/generate_h3_grid.py
          fi

      - name: Run flood update pipeline
        run: python pipeline/run_flood_update.py --current
        env:
          GEE_SERVICE_ACCOUNT_KEY: ${{ secrets.GEE_SERVICE_ACCOUNT_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Upload parquet as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flood-parquet
          path: pipeline/output/hex_flood_risk.parquet
          retention-days: 30

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Flood pipeline failed. Check logs."
          # Future: curl Slack webhook here
