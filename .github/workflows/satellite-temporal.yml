name: Update Temporal Baselines (Current vs Baseline)
# Runs monthly: exports current-period composites from GEE, computes
# delta scores (current - baseline) for 6 pixel-level analyses.
# Baseline rasters are cached in R2 and only re-exported on first run
# or when explicitly requested via include-baseline.

on:
  schedule:
    - cron: '0 7 5 * *'  # 5th of each month, 07:00 UTC
  workflow_dispatch:
    inputs:
      analyses:
        description: 'Comma-separated analysis IDs (default: all 6)'
        default: 'environmental_risk,climate_comfort,green_capital,change_pressure,agri_potential,forest_health'
      include_baseline:
        description: 'Also export baseline from GEE (first run or re-calibration)'
        type: boolean
        default: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          pip install -r pipeline/requirements.txt
          npm install -g wrangler

      - name: Generate H3 grid (if needed)
        run: |
          if [ ! -f pipeline/output/hexagons-lite.geojson ]; then
            python pipeline/generate_h3_grid.py
            python pipeline/simplify_geojson.py
          fi

      - name: Download crosswalk from R2
        run: |
          npx wrangler r2 object get "neahub/data/h3_radio_crosswalk_areal.parquet" \
            --file "pipeline/output/h3_radio_crosswalk_areal.parquet" --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Run temporal update pipeline
        run: |
          python pipeline/run_temporal_update.py \
            --analyses ${{ github.event.inputs.analyses || 'environmental_risk,climate_comfort,green_capital,change_pressure,agri_potential,forest_health' }} \
            ${{ github.event.inputs.include_baseline == 'true' && '--include-baseline' || '' }}
        env:
          GEE_SERVICE_ACCOUNT_KEY: ${{ secrets.GEE_SERVICE_ACCOUNT_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: satellite-temporal
          path: |
            pipeline/output/sat_environmental_risk.parquet
            pipeline/output/sat_climate_comfort.parquet
            pipeline/output/sat_green_capital.parquet
            pipeline/output/sat_change_pressure.parquet
            pipeline/output/sat_agri_potential.parquet
            pipeline/output/sat_forest_health.parquet
          retention-days: 30

      - name: Notify on failure
        if: failure()
        run: echo "::error::Temporal satellite pipeline failed."
