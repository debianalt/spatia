name: Update Satellite Analyses (Corrientes — Group A)
# environmental_risk + climate_comfort + green_capital for Corrientes (AR)

on:
  schedule:
    - cron: '0 7 8,23 * *'  # 8th and 23rd of each month, 07:00 UTC
  workflow_dispatch:
    inputs:
      analyses:
        description: 'Comma-separated analysis IDs (default: all group A)'
        default: 'environmental_risk,climate_comfort,green_capital'

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          pip install -r pipeline/requirements.txt
          npm install -g wrangler

      - name: Run Corrientes pixel pipeline
        run: |
          python pipeline/run_corrientes_pipeline.py \
            --only ${{ github.event.inputs.analyses || 'environmental_risk,climate_comfort,green_capital' }} \
            --upload
        env:
          GEE_SERVICE_ACCOUNT_KEY: ${{ secrets.GEE_SERVICE_ACCOUNT_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: satellite-pixel-a-corrientes
          path: |
            pipeline/output/corrientes/sat_environmental_risk.parquet
            pipeline/output/corrientes/sat_climate_comfort.parquet
            pipeline/output/corrientes/sat_green_capital.parquet
          retention-days: 30

      - name: Notify on failure
        if: failure()
        run: echo "::error::Corrientes Group A pipeline failed."
