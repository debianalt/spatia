name: Update Satellite Analyses (Itapúa — Group B)
# change_pressure + agri_potential + forest_health for Itapúa (PY)

on:
  schedule:
    - cron: '0 7 15,30 * *'  # 15th and 30th of each month, 07:00 UTC
  workflow_dispatch:
    inputs:
      analyses:
        description: 'Comma-separated analysis IDs (default: all group B)'
        default: 'change_pressure,agri_potential,forest_health'

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          pip install -r pipeline/requirements.txt
          npm install -g wrangler

      - name: Generate H3 grid + admin crosswalk for Itapúa if needed
        run: |
          if [ ! -f pipeline/output/itapua_py/hexagons.geojson ] && [ ! -f pipeline/output/itapua_py/hexagons-lite.geojson ]; then
            if [ ! -f pipeline/data/gadm41_PRY_2.shp ]; then
              mkdir -p pipeline/data
              curl -sL https://geodata.ucdavis.edu/gadm/gadm4.1/shp/gadm41_PRY_shp.zip -o pipeline/data/gadm41_PRY_shp.zip
              (cd pipeline/data && unzip -o gadm41_PRY_shp.zip "gadm41_PRY_2*" >/dev/null)
            fi
            python pipeline/build_admin_crosswalk.py --territory itapua_py --source gadm \
              --shapefile pipeline/data/gadm41_PRY_2.shp
          fi

      - name: Run Itapúa pixel pipeline
        run: |
          python pipeline/run_itapua_pipeline.py \
            --only ${{ github.event.inputs.analyses || 'change_pressure,agri_potential,forest_health' }} \
            --upload
        env:
          GEE_SERVICE_ACCOUNT_KEY: ${{ secrets.GEE_SERVICE_ACCOUNT_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: satellite-pixel-b-itapua
          path: |
            pipeline/output/itapua_py/sat_change_pressure.parquet
            pipeline/output/itapua_py/sat_agri_potential.parquet
            pipeline/output/itapua_py/sat_forest_health.parquet
          retention-days: 30

      - name: Notify on failure
        if: failure()
        run: echo "::error::Itapúa Group B pipeline failed."
