name: Update EUDR Deforestation Layer

on:
  schedule:
    - cron: '30 7 1 * *'  # 1st of each month, 07:30 UTC (staggered after satellite-pixel-a)
  workflow_dispatch:       # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
      secrets: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          sudo apt-get install -y gdal-bin
          pip install -r pipeline/requirements.txt
          npm install -g wrangler

      - name: Refresh Cloudflare auth
        run: |
          RESP=$(curl -sf -X POST "https://dash.cloudflare.com/oauth2/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=refresh_token" \
            --data-urlencode "refresh_token=${{ secrets.WRANGLER_REFRESH_TOKEN }}" \
            --data-urlencode "client_id=54d11594-84e4-41aa-b438-e81b8fa78ee7")
          ACCESS=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          NEW_REFRESH=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['refresh_token'])")
          echo "::add-mask::$ACCESS"
          echo "::add-mask::$NEW_REFRESH"
          EXPIRES=$(date -u -d '+59 minutes' '+%Y-%m-%dT%H:%M:%S.000Z')
          mkdir -p ~/.wrangler/config
          printf 'oauth_token = "%s"\nexpiration_time = "%s"\n' "$ACCESS" "$EXPIRES" > ~/.wrangler/config/default.toml
          echo "$NEW_REFRESH" | gh secret set WRANGLER_REFRESH_TOKEN --repo debianalt/nealab
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Generate EUDR H3 grid (if needed)
        run: |
          if [ ! -f pipeline/output/eudr/hexagons_eudr.geojson ]; then
            python pipeline/generate_eudr_h3_grid.py
          fi

      - name: Run EUDR deforestation pipeline
        run: python pipeline/run_eudr_update.py
        env:
          GEE_SERVICE_ACCOUNT_KEY: ${{ secrets.GEE_SERVICE_ACCOUNT_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Import to D1
        run: |
          python db/import_eudr.py
          npx wrangler d1 execute spatia-db --remote --file db/seed_eudr.sql || \
            echo "::warning::D1 import failed — check wrangler auth and D1 permissions"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload parquet as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eudr-parquet
          path: pipeline/output/eudr/eudr_deforestation.parquet
          retention-days: 30

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::EUDR pipeline failed. Check logs."
