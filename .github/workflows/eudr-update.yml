name: Update EUDR Deforestation Layer

on:
  schedule:
    - cron: '0 7 1 * *'  # 1st of each month, 07:00 UTC
  workflow_dispatch:       # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          sudo apt-get install -y gdal-bin
          pip install -r pipeline/requirements.txt
          npm install -g wrangler

      - name: Generate EUDR H3 grid (if needed)
        run: |
          if [ ! -f pipeline/output/eudr/hexagons_eudr.geojson ]; then
            python pipeline/generate_eudr_h3_grid.py
          fi

      - name: Run EUDR deforestation pipeline
        run: python pipeline/run_eudr_update.py
        env:
          GEE_SERVICE_ACCOUNT_KEY: ${{ secrets.GEE_SERVICE_ACCOUNT_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Import to D1
        # Requires CLOUDFLARE_API_TOKEN with D1:Edit permission.
        # If this step fails, update the token at Cloudflare Dashboard → API Tokens.
        # `set +e` plus explicit `exit 0` guarantees the step never fails the job —
        # `continue-on-error: true` alone is insufficient: wrangler's exit code 1
        # surfaces in the run conclusion even with it set.
        run: |
          set +e
          python db/import_eudr.py
          if [ -f db/seed_eudr.sql ]; then
            npx wrangler d1 execute spatia-db --remote --file db/seed_eudr.sql
            if [ $? -ne 0 ]; then
              echo "::warning::D1 import failed — CLOUDFLARE_API_TOKEN needs D1 Edit permission"
            fi
          else
            echo "::warning::seed_eudr.sql not produced, skipping D1 import"
          fi
          exit 0
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Upload parquet as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eudr-parquet
          path: pipeline/output/eudr/eudr_deforestation.parquet
          retention-days: 30

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::EUDR pipeline failed. Check logs."
