name: Update EUDR Deforestation Layer

on:
  schedule:
    - cron: '0 7 1 * *'  # 1st of each month, 07:00 UTC
  workflow_dispatch:       # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          sudo apt-get install -y gdal-bin
          pip install -r pipeline/requirements.txt
          npm install -g wrangler

      - name: Generate EUDR H3 grid (if needed)
        run: |
          if [ ! -f pipeline/output/eudr/hexagons_eudr.geojson ]; then
            python pipeline/generate_eudr_h3_grid.py
          fi

      - name: Run EUDR deforestation pipeline
        run: python pipeline/run_eudr_update.py
        env:
          GEE_SERVICE_ACCOUNT_KEY: ${{ secrets.GEE_SERVICE_ACCOUNT_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Import to D1
        # CLOUDFLARE_API_TOKEN needs D1:Edit permission for this step to work.
        # Create/update the token at Cloudflare Dashboard → My Profile → API Tokens.
        continue-on-error: true
        run: |
          python db/import_eudr.py
          npx wrangler d1 execute spatia-db --remote --file db/seed_eudr.sql || \
            echo "::warning::D1 import failed — CLOUDFLARE_API_TOKEN needs D1:Edit permission"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload parquet as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eudr-parquet
          path: pipeline/output/eudr/eudr_deforestation.parquet
          retention-days: 30

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::EUDR pipeline failed. Check logs."
