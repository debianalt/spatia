name: Satellite Pipeline — Flood Detection

on:
  schedule:
    # Run on 1st and 15th of each month at 06:00 UTC
    - cron: '0 6 1,15 * *'
  workflow_dispatch:
    inputs:
      run_historical:
        description: 'Run historical recurrence (slow, one-time)'
        required: false
        default: 'false'
        type: boolean

env:
  PYTHON_VERSION: '3.11'

jobs:
  flood-detection:
    name: Flood Detection Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r pipeline/requirements.txt
          pip install rasterio

      - name: Authenticate GEE
        env:
          GEE_SERVICE_ACCOUNT_KEY: ${{ secrets.GEE_SERVICE_ACCOUNT_KEY }}
        run: |
          echo "$GEE_SERVICE_ACCOUNT_KEY" > /tmp/gee-key.json
          echo "GEE_SERVICE_ACCOUNT_KEY=/tmp/gee-key.json" >> $GITHUB_ENV

      - name: Generate H3 grid (if not cached)
        run: |
          if [ ! -f pipeline/output/hexagons.geojson ]; then
            python pipeline/generate_h3_grid.py
          else
            echo "H3 grid already exists, skipping."
          fi

      - name: Run flood detection — current extent
        env:
          GEE_SERVICE_ACCOUNT_KEY: /tmp/gee-key.json
        run: python pipeline/gee_flood_detection.py --current --drive

      - name: Run flood detection — historical (if requested)
        if: github.event.inputs.run_historical == 'true'
        env:
          GEE_SERVICE_ACCOUNT_KEY: /tmp/gee-key.json
        run: python pipeline/gee_flood_detection.py --historical --drive

      - name: Process to H3 (synthetic for now)
        run: |
          python pipeline/process_to_h3.py \
            --grid pipeline/output/hexagons.geojson \
            --output pipeline/output/hex_flood_risk.parquet \
            --synthetic

      - name: Set up Node.js (for wrangler)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Upload to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler r2 object put neahub-public/data/hex_flood_risk.parquet \
            --file pipeline/output/hex_flood_risk.parquet --remote

      - name: Cleanup
        run: rm -f /tmp/gee-key.json

      - name: Summary
        run: |
          echo "## Flood Detection Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Date:** $(date -u +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "- **Parquet:** hex_flood_risk.parquet uploaded to R2" >> $GITHUB_STEP_SUMMARY
          if [ -f pipeline/output/hex_flood_risk.parquet ]; then
            SIZE=$(du -h pipeline/output/hex_flood_risk.parquet | cut -f1)
            echo "- **Size:** $SIZE" >> $GITHUB_STEP_SUMMARY
          fi
